<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <!-- Decorative inner ring -->
  <rect x="6" y="6" width="88" height="88" rx="17" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Coin circle -->
  <circle cx="50" cy="46" r="28" fill="url(#coinGrad)" />
  <circle cx="50" cy="46" r="23" fill="none" stroke="#d97706" stroke-width="2"/>
  <!-- Stylized K letter for Khaata -->
  <text x="41" y="56" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#1d4ed8" text-anchor="middle">K</text>
  <!-- Small dot accents -->
  <circle cx="22" cy="82" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="50" cy="88" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="78" cy="82" r="3" fill="rgba(255,255,255,0.4)"/>
</svg>